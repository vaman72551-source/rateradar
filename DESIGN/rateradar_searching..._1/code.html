<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-gold {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.4; }
        }
        .animate-pulse-gold {
            animation: pulse-gold 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .skeleton-shimmer {
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(212, 168, 83, 0.05) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .loading-text-glow {
            text-shadow: 0 0 8px rgba(242, 195, 107, 0.3);
        }
    </style>

<body class="bg-background text-on-background selection:bg-primary/30 min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Top App Bar (Mobile) -->
<header class="w-full sticky top-0 z-50 bg-surface dark:bg-surface border-b border-outline-variant/30 flex justify-between items-center px-margin-mobile h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">menu</span>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">RateRadar</h1>
</div>
<div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center overflow-hidden border border-outline-variant/30">
<span class="material-symbols-outlined text-on-secondary-container text-[20px]">person</span>
</div>
</header>
<!-- Main Loading Canvas -->
<main class="flex-grow px-margin-mobile pt-stack-lg pb-24 relative">
<!-- Search Status Section -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="relative w-20 h-20 mb-stack-md flex items-center justify-center">
<!-- Circular Pulse -->
<div class="absolute inset-0 border-2 border-primary/20 rounded-full animate-ping"></div>
<div class="absolute inset-2 border-2 border-primary/40 rounded-full animate-pulse"></div>

</div>
<div class="text-center">
<p class="font-title-lg text-title-lg text-primary loading-text-glow transition-all duration-500" id="loading-text">Searching 8 booking sites...</p>
<p class="font-label-md text-label-md text-on-surface-variant mt-1">Finding the best intelligence for your trip</p>
</div>
</div>
<!-- Skeleton Content Grid (Bento Style) -->
<div class="grid grid-cols-1 gap-gutter">
<!-- Skeleton Card 1 (Large Hotel Hero) -->
<div class="bg-surface-container rounded-lg border border-primary/10 overflow-hidden relative">
<div class="h-48 bg-surface-variant animate-pulse skeleton-shimmer"></div>
<div class="p-stack-md space-y-stack-sm">

<div class="flex justify-between items-end pt-stack-sm">
<div class="space-y-1">
<div class="h-3 w-16 bg-surface-variant rounded"></div>
<div class="h-8 w-24 bg-surface-variant rounded"></div>
</div>
<div class="h-10 w-28 bg-primary/20 rounded-full"></div>
</div>
</div>
</div>
<!-- Skeleton Card 2 (Small Deal Row) -->
<div class="bg-surface-container-low rounded-lg border border-primary/10 p-stack-md flex gap-stack-md items-center">
<div class="w-16 h-16 bg-surface-variant rounded animate-pulse flex-shrink-0"></div>
<div class="flex-grow space-y-2">
<div class="h-4 w-2/3 bg-surface-variant rounded"></div>
<div class="h-3 w-1/3 bg-surface-variant rounded opacity-50"></div>
</div>
<div class="text-right space-y-1">
<div class="h-4 w-12 bg-surface-variant rounded ml-auto"></div>
<div class="h-6 w-16 bg-primary/10 rounded"></div>
</div>
</div>
<!-- Skeleton Card 3 (Small Deal Row) -->
<div class="bg-surface-container-low rounded-lg border border-primary/10 p-stack-md flex gap-stack-md items-center">
<div class="w-16 h-16 bg-surface-variant rounded animate-pulse flex-shrink-0"></div>
<div class="flex-grow space-y-2">
<div class="h-4 w-3/4 bg-surface-variant rounded"></div>
<div class="h-3 w-1/4 bg-surface-variant rounded opacity-50"></div>
</div>
<div class="text-right space-y-1">
<div class="h-4 w-10 bg-surface-variant rounded ml-auto"></div>
<div class="h-6 w-14 bg-primary/10 rounded"></div>
</div>
</div>
<!-- Price Trend Skeleton -->
<div class="bg-surface-container rounded-lg border border-outline-variant/20 p-stack-md">
<div class="flex justify-between mb-4">
<div class="h-5 w-32 bg-surface-variant rounded"></div>
<div class="h-5 w-5 bg-surface-variant rounded-full"></div>
</div>
<div class="flex items-end justify-between h-20 gap-1 px-2">
<div class="w-full bg-surface-variant/30 rounded-t h-[40%] animate-pulse"></div>
<div class="w-full bg-surface-variant/30 rounded-t h-[60%] animate-pulse" style="animation-delay: 0.2s"></div>
<div class="w-full bg-surface-variant/30 rounded-t h-[80%] animate-pulse" style="animation-delay: 0.4s"></div>
<div class="w-full bg-primary/20 rounded-t h-[95%] animate-pulse" style="animation-delay: 0.6s"></div>
<div class="w-full bg-surface-variant/30 rounded-t h-[70%] animate-pulse" style="animation-delay: 0.8s"></div>
<div class="w-full bg-surface-variant/30 rounded-t h-[50%] animate-pulse" style="animation-delay: 1.0s"></div>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Mobile Fixed) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center py-2 px-4 bg-surface-container dark:bg-surface-container-lowest border-t border-outline-variant/30 shadow-lg z-50 rounded-t-lg">
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1" href="#">
<span class="material-symbols-outlined" data-icon="travel_explore">travel_explore</span>
<span class="font-label-md text-label-md">Explore</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant/50 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="local_fire_department">local_fire_department</span>
<span class="font-label-md text-label-md">Deals</span>
</a>

<span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
<span class="font-label-md text-label-md">Saved</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-variant/50 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">Profile</span>
</a>
</nav>
<script>
        // Micro-interaction: Dynamic loading text
        const statusText = document.getElementById('loading-text');
        const phrases = [
            "Searching 8 booking sites...",
            "Comparing live inventory...",
            "Applying membership discounts...",
            "Calculating secret deals...",
            "Finalizing luxury upgrades..."
        ];
        let currentIdx = 0;

        setInterval(() => {
            statusText.style.opacity = '0';
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % phrases.length;
                statusText.innerText = phrases[currentIdx];
                statusText.style.opacity = '1';
            }, 500);
        }, 3000);

        // Simulate atmospheric subtle movement
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX / window.innerWidth;
            const mouseY = e.clientY / window.innerHeight;
            // No heavy shifts, just tiny lighting variations if needed
        });
    </script>
