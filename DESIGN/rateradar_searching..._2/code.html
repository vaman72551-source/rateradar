<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        @keyframes scan-glow {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(200%); opacity: 0; }
        }

        .skeleton-shimmer {
            position: relative;
            overflow: hidden;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .skeleton-shimmer::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0,
                rgba(212, 168, 83, 0.05) 20%,
                rgba(212, 168, 83, 0.1) 60%,
                rgba(255, 255, 255, 0)
            );
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .orbit-animation {
            animation: orbit 4s linear infinite;
        }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(40px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(40px) rotate(-360deg); }
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .pulse-gold {
            animation: pulse-gold 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-gold {
            0%, 100% { opacity: 1; }
            50% { opacity: .4; }
        }
    </style>

<script>
        // Optional micro-interactions
        document.addEventListener('DOMContentLoaded', () => {
            const nodes = document.querySelectorAll('.orbit-animation > div');
            nodes.forEach(node => {
                node.addEventListener('mouseover', () => {
                    node.style.boxShadow = '0 0 25px rgba(242,195,107,1)';
                    node.parentElement.style.animationPlayState = 'paused';
                });
                node.addEventListener('mouseout', () => {
                    node.style.boxShadow = '';
                    node.parentElement.style.animationPlayState = 'running';
                });
            });
        });
